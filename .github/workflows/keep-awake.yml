name: Keep Streamlit Awake

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Wake Streamlit App
        run: |
          curl -L --max-time 60 --silent --output /dev/null \
          "https://ekonomi-dunyasi-yonetim-msu7zf86qlczbai2sb99am.streamlit.app" || true
